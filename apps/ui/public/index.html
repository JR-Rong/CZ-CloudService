<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Agent 管理平台</title>
    <link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"%3E%3Crect width="32" height="32" rx="6" fill="%230f172a"/%3E%3Cpath d="M8 17h16M16 8v16" stroke="%2338bdf8" stroke-width="3" stroke-linecap="round"/%3E%3C/svg%3E' />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app" class="shell">
      <section class="login-view" aria-labelledby="login-title">
        <div class="login-panel">
          <p class="product-mark">CZ CloudService</p>
          <h1 id="login-title">Hermes Agent 管理平台</h1>
          <form id="login-form" class="form-grid">
            <label>
              <span>Username</span>
              <input name="username" autocomplete="username" required />
            </label>
            <label>
              <span>Password</span>
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">Login</button>
          </form>
          <p id="login-error" class="error-text" role="alert"></p>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
